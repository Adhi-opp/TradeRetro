services:
  # ── TimescaleDB (PostgreSQL + time-series extension) ────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traderetro_raw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./python-engine/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (message broker for streaming pipeline) ───────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Python Engine (unified FastAPI backend) ─────────────────
  api:
    build:
      context: ./python-engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/traderetro_raw
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Pipeline Worker (Redis Streams consumer + tick producer) ─
  pipeline-worker:
    build:
      context: ./python-engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/traderetro_raw
      REDIS_URL: redis://redis:6379
      PIPELINE_MODE: simulate
      SIMULATE_RATE: "10"
    command: ["python", "-m", "pipeline.worker"]
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Frontend (Vite dev server) ────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
