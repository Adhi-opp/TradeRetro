services:
  # ── TimescaleDB (PostgreSQL + time-series extension) ────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traderetro_raw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./python-engine/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (message broker for streaming pipeline) ───────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Python Engine (unified FastAPI backend) ─────────────────
  api:
    build:
      context: ./python-engine
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Override DB/Redis URLs for Docker networking (takes precedence over .env)
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/traderetro_raw
      REDIS_URL: redis://redis:6379
      PREFECT_API_URL: http://prefect-server:4200/api
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      prefect-server:
        condition: service_healthy

  # ── Pipeline Worker (Redis Streams consumer + tick producer) ─
  pipeline-worker:
    build:
      context: ./python-engine
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/traderetro_raw
      REDIS_URL: redis://redis:6379
      PIPELINE_MODE: live
      PREFECT_API_URL: http://prefect-server:4200/api
    command: ["python", "-m", "pipeline.worker"]
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prefect Server (orchestration UI + API) ──────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_API_DATABASE_CONNECTION_URL: "sqlite+aiosqlite:////data/prefect.db"
    volumes:
      - prefect_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:4200/api/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Grafana (observability dashboards) ───────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: traderetro
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/pipeline_health.json
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── React Frontend (Vite dev server) ────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  prefect_data:
  grafana_data:
