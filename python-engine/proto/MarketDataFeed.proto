// Upstox v2 Market Data Feed — protobuf schema.
// Source: Upstox API documentation.
// Compile: protoc -I=proto --python_out=proto proto/MarketDataFeed.proto

syntax = "proto3";

package com.upstox.marketdatafeeder.rpc.proto;

message FeedResponse {
    map<string, Feed> feeds = 1;
}

message Feed {
    oneof feed {
        FullFeed ff = 1;
        OptionGreeks og = 2;
    }
}

message FullFeed {
    MarketFullFeed marketFF = 1;
    IndexFullFeed indexFF = 2;
}

message MarketFullFeed {
    LTPC ltpc = 1;
    MarketLevel marketLevel = 2;
    OptionGreeks optionGreeks = 3;
    MarketOHLC marketOHLC = 4;
    ExtendedFeedDetails eFeedDetails = 5;
}

message IndexFullFeed {
    LTPC ltpc = 1;
    MarketOHLC marketOHLC = 2;
}

message LTPC {
    double ltp = 1;     // Last traded price
    int64 ltt = 2;      // Last traded timestamp (epoch ms)
    double ltq = 3;     // Last traded quantity
    double cp = 4;      // Previous day close price
}

message MarketLevel {
    repeated Quote bidAskQuote = 1;
}

message Quote {
    int32 bq = 1;       // Bid quantity
    double bp = 2;      // Bid price
    int32 aq = 3;       // Ask quantity
    double ap = 4;      // Ask price
}

message MarketOHLC {
    repeated OHLC ohlc = 1;
}

message OHLC {
    string interval = 1;
    double open = 2;
    double high = 3;
    double low = 4;
    double close = 5;
    int64 volume = 6;
    int32 ts = 7;       // Timestamp
}

message ExtendedFeedDetails {
    double atp = 1;     // Average traded price
    double oi = 2;      // Open interest
    double oiChange = 3;
    double tbq = 4;     // Total buy quantity
    double tsq = 5;     // Total sell quantity
    double vol = 6;     // Volume
}

message OptionGreeks {
    double op = 1;
    double up = 2;
    double iv = 3;      // Implied volatility
    double delta = 4;
    double theta = 5;
    double gamma = 6;
    double vega = 7;
    double rho = 8;
}
