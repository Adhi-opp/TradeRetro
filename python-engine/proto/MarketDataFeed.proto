// Upstox V3 Market Data Feed — protobuf schema.
// Source: https://upstox.com/developer/api-documentation/example-code/websocket/market-data-feeder/v-3
// Compile: protoc -I=proto --python_out=proto proto/MarketDataFeed.proto
//
// Key differences from V2:
//   - FeedResponse adds `type` and `marketInfo` fields
//   - Feed is now a oneof of {ltpc | fullFeed | firstLevelWithGreeks}
//     instead of V2's {ff | og}
//   - FullFeed itself wraps a oneof of {marketFF | indexFF}

syntax = "proto3";

package com.upstox.marketdatafeederv3udapi.rpc.proto;

enum Type {
  initial_feed = 0;
  live_feed = 1;
  market_info = 2;
}

enum RequestMode {
  ltpc = 0;
  full_d5 = 1;
  option_greeks = 2;
  full_d30 = 3;
}

enum MarketStatus {
  PRE_OPEN_START = 0;
  PRE_OPEN_END = 1;
  NORMAL_OPEN = 2;
  NORMAL_CLOSE = 3;
  CLOSING_START = 4;
  CLOSING_END = 5;
}

message LTPC {
  double ltp = 1;       // Last traded price
  int64 ltt = 2;        // Last traded timestamp (epoch ms)
  int64 ltq = 3;        // Last traded quantity
  double cp = 4;        // Previous close
}

message Quote {
  int32 bidQ = 1;
  double bidP = 2;
  int32 askQ = 3;
  double askP = 4;
}

message MarketLevel {
  repeated Quote bidAskQuote = 1;
}

message OptionGreeks {
  double op = 1;
  double iv = 2;
  double delta = 3;
  double theta = 4;
  double gamma = 5;
  double vega = 6;
  double rho = 7;
}

message OHLC {
  string interval = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 vol = 6;
  int64 ts = 7;
}

message MarketOHLC {
  repeated OHLC ohlc = 1;
}

message MarketFullFeed {
  LTPC ltpc = 1;
  MarketLevel marketLevel = 2;
  OptionGreeks optionGreeks = 3;
  MarketOHLC marketOHLC = 4;
  double atp = 5;
  int64 vtt = 6;
  double oi = 7;
  double iv = 8;
  double tbq = 9;
  double tsq = 10;
}

message IndexFullFeed {
  LTPC ltpc = 1;
  MarketOHLC marketOHLC = 2;
}

message FullFeed {
  oneof FullFeedUnion {
    MarketFullFeed marketFF = 1;
    IndexFullFeed indexFF = 2;
  }
}

message FirstLevel {
  Quote bidAskQuote = 1;
}

message FirstLevelWithGreeks {
  LTPC ltpc = 1;
  FirstLevel firstDepth = 2;
  OptionGreeks optionGreeks = 3;
  double vtt = 4;
  double oi = 5;
  double iv = 6;
}

message Feed {
  oneof FeedUnion {
    LTPC ltpc = 1;
    FullFeed fullFeed = 2;
    FirstLevelWithGreeks firstLevelWithGreeks = 3;
  }
  RequestMode requestMode = 4;
  int64 currentTs = 5;
}

message MarketInfo {
  map<string, MarketStatus> segmentStatus = 1;
}

message FeedResponse {
  Type type = 1;
  map<string, Feed> feeds = 2;
  string currentTs = 3;
  MarketInfo marketInfo = 4;
}
