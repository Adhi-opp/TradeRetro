line-length = 120
target-version = "py312"

[lint]
select = ["E4", "E7", "E9", "F"]

[lint.per-file-ignores]
# main.py configures logging before importing app modules — intentional
"main.py" = ["E402"]
# test_routers.py stubs sys.modules before importing the app — intentional
"tests/test_routers.py" = ["E402"]
