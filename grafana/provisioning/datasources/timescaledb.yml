apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    access: proxy
    url: timescaledb:5432
    user: $__env{POSTGRES_USER}
    jsonData:
      database: $__env{POSTGRES_DB}
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: $__env{POSTGRES_PASSWORD}
    isDefault: true
    editable: false
