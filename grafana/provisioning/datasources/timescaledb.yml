apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    access: proxy
    url: timescaledb:5432
    user: postgres
    jsonData:
      database: traderetro_raw
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: postgres
    isDefault: true
    editable: false
